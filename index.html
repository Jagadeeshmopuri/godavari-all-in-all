<!DOCTYPE html>
<html>
<head>
  <title>GodavariHomeFix</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <div class="logo-container">
    <img src="https://img.icons8.com/color/48/home.png" />
    <h1>GodavariHomeFix</h1>
  </div>

  <p>Serving Rajahmundry & Kakinada | Fast & Trusted Home Services</p>

  <button class="cta" onclick="bookService('General Service')">
    Book Service Now
  </button>

  <a href="tel:+917780178447" class="call-btn">📞 Call Now</a>
</header>

<section class="services">

  <div class="card">
    <h3><img src="https://img.icons8.com/color/48/plumbing.png" class="icon"> Plumbing</h3>
    <button onclick="bookService('Plumbing')">Book Service</button>
  </div>

  <div class="card">
    <h3><img src="https://img.icons8.com/color/48/electrical.png" class="icon"> Electrical</h3>
    <button onclick="bookService('Electrical')">Book Service</button>
  </div>

  <div class="card">
    <h3><img src="https://cdn-icons-png.flaticon.com/512/1946/1946429.png" class="icon"> Maid Service</h3>
    <button onclick="bookService('Maid Service')">Book Service</button>
  </div>

  <div class="card">
    <h3><img src="https://img.icons8.com/color/48/maintenance.png" class="icon"> Appliance Repair</h3>
    <button onclick="bookService('Appliance Repair')">Book Service</button>
  </div>

</section>

<!-- BOOKING FORM -->
<section class="booking">
  <h2>Book a Service</h2>

  <form onsubmit="submitForm(event)">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="phone" placeholder="Phone Number" required>
    <input type="text" id="location" placeholder="Location" required>

    <select id="service">
      <option>Plumbing</option>
      <option>Electrical</option>
      <option>Maid Service</option>
      <option>Appliance Repair</option>
    </select>

    <button type="submit">Submit Booking</button>
  </form>
</section>

<footer>
  <p>© 2026 GodavariHomeFix</p>
</footer>

<a href="https://wa.me/917780178447" class="whatsapp-float" target="_blank">
  💬
</a>

<script src="app.js"></script>

</body>
</html>
